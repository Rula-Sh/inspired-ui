<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../main.css" />
    <link rel="stylesheet" href="../../nav.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Slide Carousel</title>
  </head>
  <body>
    <div class="page-content">
      <div id="slider">
        <input type="radio" name="slider" id="slide1" checked />
        <input type="radio" name="slider" id="slide2" />
        <input type="radio" name="slider" id="slide3" />
        <input type="radio" name="slider" id="slide4" />
        <div id="slides">
          <div id="overflow">
            <div class="inner">
              <div class="slide slide_1">
                <img src="../../images/nature/1.png" alt="" />
              </div>
              <div class="slide slide_2">
                <img src="../../images/nature/2.png" alt="" />
              </div>
              <div class="slide slide_3">
                <img src="../../images/nature/3.png" alt="" />
              </div>
              <div class="slide slide_4">
                <img src="../../images/nature/4.png" alt="" />
              </div>
            </div>
          </div>
        </div>
        <div id="controls">
          <label for="slide1"></label>
          <label for="slide2"></label>
          <label for="slide3"></label>
          <label for="slide4"></label>
        </div>
        <div id="bullets">
          <label for="slide1"></label>
          <label for="slide2"></label>
          <label for="slide3"></label>
          <label for="slide4"></label>
        </div>
      </div>
    </div>

    <small class="credit">
      Inspired by:
      <a
        href="https://www.youtube.com/watch?v=1CZhGDU5cWM"
        style="color: inherit"
      >
        Anna Blok — Frontend Tutorial
      </a>
    </small>

    <script src="../../nav.js"></script>
  </body>
</html>
