<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../main.css" />
    <link rel="stylesheet" href="../../nav.css" />
    <title>Border Hover</title>
    <style>
      .page-content {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 60px);
      }

      img {
        width: 250px;
        aspect-ratio: 1;
        transition: 0.3s;
        cursor: pointer;
        outline: calc(250px / 2) solid #0007;
        outline-offset: calc(250px / -2);
      }

      img:hover {
        outline: 8px solid #5a7d9c;
        outline-offset: 14px;
      }
    </style>
  </head>
  <body>
    <div class="page-content">
      <img src="image.png" alt="" />
    </div>

    <small class="credit">
      Inspired by:
      <a
        href="https://web.facebook.com/reel/1421925772942641"
        style="color: inherit"
      >
        Dark CSS
      </a>
    </small>

    <script src="../../nav.js"></script>
  </body>
</html>
